kind = "web"
previewPath = "/"
title = "Pandit Shri Kashi Prasad Tiwari Trust"
version = "1.0.0"
id = "artifacts/trust-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24682

[services.development]
run = "pnpm --filter @workspace/trust-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trust-website", "run", "build" ]
publicDir = "artifacts/trust-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24682"
BASE_PATH = "/"
